<!DOCTYPE html>
<!-- saved from url=(0035)https://quenq.com/apps/emulator/app -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmulatorJS Player</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded&display=swap");
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2D353E; }
        body.upload-mode { display: flex; align-items: center; justify-content: center; text-align: center; font-family: 'Zalando Sans Expanded', Geneva, Tahoma, sans-serif; color: #ccc; transition: background-color .2s; }
        body.upload-mode.dragover { background-color: #1a1a1a; }
        .upload-content h2 { font-size: 1.5em; margin-top: 0; }
        .upload-content p { margin-bottom: 20px; }
        .upload-label { padding: 10px 20px; background-color: #43515E; color: white; border: 1px solid #555; border-radius: 5px; cursor: pointer; display: inline-block; }
        .upload-label:hover { background-color: #555; }
        #rom-upload { display: none; }
    </style>
</head>
<body class="upload-mode">

    <div id="upload-content" class="upload-content">
        <h2>Console Emulator</h2>
        <p>Upload or Drag &amp; Drop a ROM file here to play.</p>
        <label for="rom-upload" class="upload-label">Select ROM File</label>
        <input type="file" id="rom-upload">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const body = document.body;
            const romUpload = document.getElementById("rom-upload");

            const run = async (file) => {
                const parts = file.name.split(".");
                const ext = parts.pop().toLowerCase();
                const gameName = parts.join('.');
                
                const core_mapping = { "fds":"nes", "nes":"nes", "unif":"nes", "unf":"nes", "smc":"snes", "fig":"snes", "sfc":"snes", "gd3":"snes", "gd7":"snes", "dx2":"snes", "bsx":"snes", "swc":"snes", "z64":"n64", "n64":"n64", "pce":"pce", "ngp":"ngp", "ngc":"ngp", "ws":"ws", "wsc":"ws", "col":"coleco", "cv":"coleco", "d64":"vice_x64sc", "nds":"nds", "gba":"gba", "gb":"gb", "gbc":"gb", "psx":"psx", "img":"psx", "bin":"psx", "iso":"psx", "vb":"vb", "md":"segaMD", "smd":"segaMD", "gen":"segaMD", "sms":"segaMS", "gg":"segaGG", "32x":"sega32x", "cue":"segaSaturn", "lnx":"lynx", "jag":"jaguar", "a78":"atari7800", "a26":"atari2600", "zip":"arcade" };
                const core = core_mapping[ext];

                if (!core) {
                    alert("Unsupported file type: ." + ext + "\n\nPlease select a valid ROM file.");
                    return;
                }

                body.innerHTML = '';
                body.classList.remove("upload-mode");
                
                const gameContainer = document.createElement('div');
                gameContainer.id = 'game-container';
                gameContainer.style.width = "100%";
                gameContainer.style.height = "100%";
                body.appendChild(gameContainer);
                
                window.EJS_player = "#game-container";
                window.EJS_gameName = gameName;
                window.EJS_biosUrl = "";
                window.EJS_gameUrl = URL.createObjectURL(file);
                window.EJS_core = core;
                window.EJS_pathtodata = "data/";
                window.EJS_startOnLoaded = true;
                
                const script = document.createElement('script');
                script.src = "data/loader.js";
                script.onerror = () => {
                    body.innerHTML = '<div style="color:white; text-align:center;"><h2>Error</h2><p>Failed to load EmulatorJS core files.</p></div>';
                };
                document.body.appendChild(script);
            };

            romUpload.addEventListener('change', () => {
                if (romUpload.files.length > 0) run(romUpload.files[0]);
            });

            body.addEventListener("dragover", (e) => {
                e.preventDefault();
                body.classList.add("dragover");
            });

            body.addEventListener("dragleave", () => {
                body.classList.remove("dragover");
            });

            body.addEventListener("drop", (e) => {
                e.preventDefault();
                body.classList.remove("dragover");
                if (e.dataTransfer.files.length > 0) {
                    romUpload.files = e.dataTransfer.files;
                    run(e.dataTransfer.files[0]);
                }
            });
        });
    </script>
