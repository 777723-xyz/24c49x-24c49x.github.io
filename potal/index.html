<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>学習ポータル</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans JP", sans-serif;
    background:#f3f3f3;
    color:#222;
}

/* ===== 上部画像 ===== */

.hero{
    position:relative;
    width:100%;
    height:320px;
    background:url("pencil.jpg") center center/cover no-repeat;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

.hero-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:90%;
}

.hero h1{
    color:white;
    font-weight:300;
    font-size:64px;
    letter-spacing:2px;
}

/* ===== カード ===== */

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
}

.card{
    background:white;
    border:1px solid #d9d9d9;
    border-radius:12px;
    padding:30px 20px;
    text-align:center;
    text-decoration:none;
    color:#222;
    transition:0.2s ease;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card img{
    width:120px;
    height:120px;
    object-fit:contain;
}

.card p{
    margin-top:20px;
    font-size:18px;
}

/* ===== スマホ対応 ===== */

@media (max-width:768px){

    .hero{
        height:220px;
    }

    .hero h1{
        font-size:38px;
        line-height:1.4;
    }

    .grid{
        grid-template-columns:1fr 1fr;
        gap:15px;
    }

    .card{
        padding:20px 10px;
    }

    .card img{
        width:80px;
        height:80px;
    }

    .card p{
        font-size:14px;
    }

}

@media (max-width:480px){

    .hero h1{
        font-size:30px;
    }

    .grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<!-- 上部画像 -->

<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">
        <h1>伊豆の国市 学習ポータル</h1>
    </div>

</section>

<!-- メニュー -->

<div class="container">

    <div class="grid">

        <a class="card" href="#">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Google_Workspace_Logo.svg">
            <p>Google Workspace</p>
        </a>

        <a class="card" href="#">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png">
            <p>マイドライブ</p>
        </a>

        <a class="card" href="#">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png">
            <p>クラスルーム</p>
        </a>

        <a class="card" href="#">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/75/NHK_logo_2020.svg">
            <p>NHK for School</p>
        </a>

    </div>

</div>

</body>
</html>
