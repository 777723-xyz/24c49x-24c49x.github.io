<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>伊豆の国市 学習者ポータル</title>

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

    <!-- フォント -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

    <!-- 上部画像 -->

    <section class="hero">

        <div class="overlay"></div>

        <!-- 左上タイトル -->

        <div class="top-title">
            <span class="QTKDff">
                伊豆の国市 学習者ポータル
            </span>
        </div>

        <!-- 真ん中タイトル -->

        <div class="center-title">
            伊豆の国市 学習ポータル
        </div>

    </section>

    <!-- メニュー -->

    <div class="container">

        <div class="grid">

            <!-- Google Workspace -->

            <a class="card" href="#">

                <div class="card-box">

                    <img src="googleapp.png">

                </div>

                <p>アプリケーション</p>

            </a>

            <!-- Google Drive -->

            <a class="card" href="#">

                <div class="card-box">

                    <img src="drive.png">

                </div>

                <p>マイドライブ</p>

            </a>

            <!-- Classroom -->

            <a class="card" href="#">

                <div class="card-box">

                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png">

                </div>

                <p>クラスルーム</p>

            </a>

            <!-- NHK -->

            <a class="card nhk" href="#">

                <div class="card-box">

                    <img src="nhk.png">

                </div>

                <p>NHK for School</p>

            </a>

        </div>

    </div>

</body>
</html>
