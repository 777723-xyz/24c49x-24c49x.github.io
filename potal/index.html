<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>伊豆の国市 学習者ポータル</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans JP", sans-serif;
    background:#f3f3f3;
    color:#222;
}

/* ===== 上部画像 ===== */

.hero{
    position:relative;
    width:100%;
    height:340px;
    background:url("pencil.jpg") center center/cover no-repeat;
}

/* 暗くする */

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

/* 左上タイトル */

.top-title{
    position:absolute;
    top:18px;
    left:20px;
    color:white;
    font-size:28px;
    font-weight:400;
    z-index:2;
    text-shadow:0 2px 5px rgba(0,0,0,0.4);
}

/* 真ん中タイトル */

.center-title{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:64px;
    font-weight:300;
    text-align:center;
    z-index:2;
    width:90%;
}

/* ===== カード ===== */

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
}

.card{
    text-decoration:none;
    color:#222;
    text-align:center;
}

.card-box{
    background:white;
    border:1px solid #b7c7e8;
    border-radius:10px;
    padding:25px;
    height:220px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.2s;
}

.card-box:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.card img{
    max-width:140px;
    max-height:140px;
    object-fit:contain;
}

.card p{
    margin-top:14px;
    font-size:15px;
}

/* NHKだけ少し大きめ */

.nhk img{
    max-width:160px;
}

/* ===== スマホ ===== */

@media (max-width:768px){

    .hero{
        height:240px;
    }

    .top-title{
        font-size:20px;
    }

    .center-title{
        font-size:36px;
        line-height:1.4;
    }

    .grid{
        grid-template-columns:1fr 1fr;
        gap:18px;
    }

    .card-box{
        height:180px;
        padding:15px;
    }

    .card img{
        max-width:90px;
        max-height:90px;
    }

}

@media (max-width:480px){

    .grid{
        grid-template-columns:1fr;
    }

    .center-title{
        font-size:28px;
    }

}

</style>
</head>

<body>

<!-- ===== 上部 ===== -->

<section class="hero">

    <div class="overlay"></div>

    <!-- 左上 -->

    <div class="top-title">
        伊豆の国市 学習者ポータル
    </div>

    <!-- 真ん中 -->

    <div class="center-title">
        伊豆の国市 学習ポータル
    </div>

</section>

<!-- ===== メニュー ===== -->

<div class="container">

    <div class="grid">

        <!-- Google Workspace -->

        <a class="card" href="#">
            <div class="card-box">
                <img src="https://lh3.googleusercontent.com/sitesv/AA5AbUBXTdZtf15P0Pll9O2RymxAEOHxyPk-PlG_7xOPvFXa6kiWlaqMd7Ctm6tIHqal97ybUG02cYgGQvZin4RMKB3gG6KZmquwV3tiwAx4qt8t5JLq19fjSVzCHaMBXsIUGOO_eqEfZLiW8mp5E8_b-4NufqKsowR7DyhM7V8MHXBaqCkDzZ1EnZ0HHtQ=w1280">
            </div>
            <p>アプリケーション</p>
        </a>

        <!-- Drive -->

        <a class="card" href="#">
            <div class="card-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png">
            </div>
            <p>マイドライブ</p>
        </a>

        <!-- Classroom -->

        <a class="card" href="#">
            <div class="card-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png">
            </div>
            <p>クラスルーム</p>
        </a>

        <!-- NHK -->

        <a class="card nhk" href="#">
            <div class="card-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/NHK_for_School_logo.png">
            </div>
            <p>NHK for School</p>
        </a>

    </div>

</div>

</body>
</html>
