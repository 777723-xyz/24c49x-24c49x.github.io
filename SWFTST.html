
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruffle Player</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded&display=swap");
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2D353E; }
        body.upload-mode { display: flex; align-items: center; justify-content: center; text-align: center; font-family: 'Zalando Sans Expanded', Geneva, Tahoma, sans-serif; color: #ccc; transition: background-color .2s; }
        body.upload-mode.dragover { background-color: #1a1a1a; }
        .upload-content h2 { font-size: 1.5em; margin-top: 0; }
        .upload-content p { margin-bottom: 20px; }
        .upload-label { padding: 10px 20px; background-color: #43515E; color: white; border: 1px solid #555; border-radius: 5px; cursor: pointer; display: inline-block; }
        .upload-label:hover { background-color: #555; }
        #swf-upload { display: none; }
        
        #sg-overlay {
            position: fixed; left: 0; bottom: 0; width: 100%; height: 240px;
            z-index: 99999999; pointer-events: none;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 20px 20px; box-sizing: border-box; font-family: sans-serif;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        .sg-group { pointer-events: auto; position: relative; }
        #sg-dpad { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px; gap: 5px; }
        .sg-btn {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3), inset 0 2px 2px rgba(255,255,255,0.2);
            transition: background 0.05s, transform 0.05s, box-shadow 0.05s; 
            -webkit-tap-highlight-color: transparent; touch-action: none;
        }
        .sg-btn.is-pressed { background: rgba(255, 255, 255, 0.4); transform: scale(0.85) translateY(4px); box-shadow: 0 1px 2px rgba(0,0,0,0.4), inset 0 4px 8px rgba(0,0,0,0.4); }
        .sg-arrow { font-size: 24px; width: 60px; height: 60px; }
        #sg-up { grid-column: 2; grid-row: 1; } #sg-left { grid-column: 1; grid-row: 2; }
        #sg-right { grid-column: 3; grid-row: 2; } #sg-down { grid-column: 2; grid-row: 3; }
        #sg-actions { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        #sg-space { width: 90px; height: 90px; font-size: 36px; font-weight: bold; }
        #sg-close { width: 40px; height: 40px; font-size: 18px; align-self: flex-end; background: rgba(255,0,0,0.3); }
    </style>
</head>
<body class="upload-mode">

    <div id="upload-content" class="upload-content">
        <h2>Flash Player Emulator</h2>
        <p>Upload or Drag & Drop a .swf file here to run it.</p>
        <label for="swf-upload" class="upload-label">Select .SWF File</label>
        <input type="file" id="swf-upload" accept=".swf">
    </div>

    <script>
        function loadLocalRuffle(){var script=document.createElement('script');script.src='ruffle.js';document.body.appendChild(script)}
        var cdnScript=document.createElement('script');cdnScript.src='https://unpkg.com/@ruffle-rs/ruffle';cdnScript.onerror=loadLocalRuffle;document.body.appendChild(cdnScript);
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            window.RufflePlayer = window.RufflePlayer || {};
            const body = document.body;
            const swfUpload = document.getElementById("swf-upload");
            const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

            const injectTouchControls = () => {
                if (!isTouch || document.getElementById('sg-overlay')) return;

                const html = `
                    <div id="sg-overlay">
                        <div class="sg-group" id="sg-dpad">
                            <div class="sg-btn sg-arrow" id="sg-up" data-key="ArrowUp" data-code="ArrowUp" data-id="38"><svg fill="#ffffff" width="28px" height="28px" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(0deg);"><path d="M236.77344,211.97656a23.75471,23.75471,0,0,1-20.79688,12.01563H40.02344a23.9925,23.9925,0,0,1-20.76563-36.02344L107.23437,35.97656h-.00781a24.00413,24.00413,0,0,1,41.54688,0l87.96875,151.99219A23.744,23.744,0,0,1,236.77344,211.97656Z"></path></svg></div>
                            <div class="sg-btn sg-arrow" id="sg-left" data-key="ArrowLeft" data-code="ArrowLeft" data-id="37"><svg fill="#ffffff" width="28px" height="28px" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(-90deg);"><path d="M236.77344,211.97656a23.75471,23.75471,0,0,1-20.79688,12.01563H40.02344a23.9925,23.9925,0,0,1-20.76563-36.02344L107.23437,35.97656h-.00781a24.00413,24.00413,0,0,1,41.54688,0l87.96875,151.99219A23.744,23.744,0,0,1,236.77344,211.97656Z"></path></svg></div>
                            <div class="sg-btn sg-arrow" id="sg-right" data-key="ArrowRight" data-code="ArrowRight" data-id="39"><svg fill="#ffffff" width="28px" height="28px" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(90deg);"><path d="M236.77344,211.97656a23.75471,23.75471,0,0,1-20.79688,12.01563H40.02344a23.9925,23.9925,0,0,1-20.76563-36.02344L107.23437,35.97656h-.00781a24.00413,24.00413,0,0,1,41.54688,0l87.96875,151.99219A23.744,23.744,0,0,1,236.77344,211.97656Z"></path></svg></div>
                            <div class="sg-btn sg-arrow" id="sg-down" data-key="ArrowDown" data-code="ArrowDown" data-id="40"><svg fill="#ffffff" width="28px" height="28px" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(180deg);"><path d="M236.77344,211.97656a23.75471,23.75471,0,0,1-20.79688,12.01563H40.02344a23.9925,23.9925,0,0,1-20.76563-36.02344L107.23437,35.97656h-.00781a24.00413,24.00413,0,0,1,41.54688,0l87.96875,151.99219A23.744,23.744,0,0,1,236.77344,211.97656Z"></path></svg></div>
                        </div>
                        <div class="sg-group" id="sg-actions">
                            <div class="sg-btn" id="sg-close">✖</div>
                            <div class="sg-btn" id="sg-space" data-key=" " data-code="Space" data-id="32">A</div>
                        </div>
                    </div>
                `;

                const wrapper = document.createElement('div');
                wrapper.innerHTML = html;
                document.body.appendChild(wrapper.firstElementChild);
                
                const overlay = document.getElementById('sg-overlay');

                const sendKey = (type, key, code, keyCode) => {
                    const targetEl = document.querySelector("canvas, ruffle-player, ruffle-embed") || document.activeElement || document.body;
                    const event = new KeyboardEvent(type, {
                        key: key, code: code, keyCode: keyCode, which: keyCode,
                        bubbles: true, cancelable: true, view: window
                    });
                    if (type === 'keydown' && targetEl.focus) targetEl.focus();
                    targetEl.dispatchEvent(event);
                };

                const handleTouchState = (btn, type) => {
                    const k = btn.dataset.key; const c = btn.dataset.code; const id = parseInt(btn.dataset.id);
                    if (type === 'keydown') {
                        if (btn.classList.contains('is-pressed')) return; 
                        btn.classList.add('is-pressed');
                        sendKey('keydown', k, c, id);
                    } else {
                        btn.classList.remove('is-pressed');
                        sendKey('keyup', k, c, id);
                    }
                };

                overlay.querySelectorAll('.sg-btn[data-key]').forEach(btn => {
                    btn.addEventListener('touchstart', (e) => {
                        if (e.cancelable) e.preventDefault();
                        handleTouchState(btn, 'keydown');
                    }, { passive: false });

                    btn.addEventListener('touchend', (e) => {
                        if (e.cancelable) e.preventDefault();
                        if (e.targetTouches.length === 0) handleTouchState(btn, 'keyup');
                    }, { passive: false });

                    btn.addEventListener('touchcancel', (e) => {
                        if (e.cancelable) e.preventDefault();
                        if (e.targetTouches.length === 0) handleTouchState(btn, 'keyup');
                    }, { passive: false });
                });

                const closeBtn = document.getElementById('sg-close');
                const closeOverlay = (e) => { e.preventDefault(); overlay.style.display = 'none'; };
                closeBtn.addEventListener('touchstart', closeOverlay, { passive: false });
                closeBtn.addEventListener('click', closeOverlay);
            };

            const loadSWF = (file) => {
                if (!file || !file.name.toLowerCase().endsWith('.swf')) {
                    alert("Please provide a valid .swf file.");
                    return;
                }
                try {
                    const ruffle = window.RufflePlayer.newest();
                    const player = ruffle.createPlayer();
                    player.style.width = "100%";
                    player.style.height = "100%";
                    
                    body.innerHTML = '';
                    body.classList.remove("upload-mode");
                    
                    body.appendChild(player);

                    injectTouchControls();

                    player.load(URL.createObjectURL(file));
                } catch (e) {
                    console.error(e);
                    body.innerHTML = '<div style="color:white; text-align:center;"><h2>Error</h2><p>Ruffle failed to load. Please try again.</p></div>';
                }
            };

            swfUpload.addEventListener('change', () => {
                if (swfUpload.files.length > 0) loadSWF(swfUpload.files[0]);
            });

            body.addEventListener("dragover", (e) => {
                e.preventDefault();
                body.classList.add("dragover");
            });

            body.addEventListener("dragleave", () => {
                body.classList.remove("dragover");
            });

            body.addEventListener("drop", (e) => {
                e.preventDefault();
                body.classList.remove("dragover");
                if (e.dataTransfer.files.length > 0) {
                    swfUpload.files = e.dataTransfer.files;
                    loadSWF(e.dataTransfer.files[0]);
                }
            });
        });
    </script>
</body>
</html>
